name: release-please
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          # Pre-1.0 behavior: feat bumps minor (0.1.0 -> 0.2.0) instead
          # of jumping to 1.0.0 on the first feature. Breaking changes
          # still bump minor on 0.x; graduate to 1.0.0 manually when
          # the API is intentionally stabilized.
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: false

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm run compile
        if: ${{ steps.release.outputs.release_created }}

      - run: npx --yes @vscode/vsce package
        if: ${{ steps.release.outputs.release_created }}

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ steps.release.outputs.tag_name }} *.vsix
        if: ${{ steps.release.outputs.release_created }}
